<svg width="160" height="45" viewBox="0 0 160 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Modern V Shape with Shopping Bag -->
  <g>
    <!-- Left side of V -->
    <path d="M 8 8 L 18 28 L 14 28 L 6 12" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Right side of V -->
    <path d="M 28 8 L 18 28 L 22 28 L 30 12" stroke="url(#pinkGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Shopping bag handle -->
    <path d="M 12 28 C 12 22, 24 22, 24 28" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Shopping bag body -->
    <rect x="11" y="28" width="14" height="10" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
    
    <!-- Decorative dots inside bag -->
    <circle cx="16" cy="33" r="0.8" fill="url(#accentGrad)"/>
    <circle cx="19" cy="33" r="0.8" fill="url(#pinkGrad)"/>
    <circle cx="17.5" cy="36" r="0.8" fill="url(#accentGrad)"/>
  </g>

  <!-- Brand Text "VKART" with Modern Font -->
  <g>
    <!-- Main Text -->
    <text x="38" y="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.8">
      VKART
    </text>
    
    <!-- Tagline - Optional, below main text -->
    <text x="38" y="40" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" fill="url(#accentGrad)" letter-spacing="0.5">
      SHOP SMART
    </text>
  </g>

  <!-- Accent line under logo -->
  <line x1="38" y1="44" x2="155" y2="44" stroke="url(#pinkGrad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Floating accent circles for modern feel -->
  <circle cx="145" cy="12" r="2.5" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="155" cy="30" r="1.5" fill="url(#pinkGrad)" opacity="0.5"/>
</svg>
